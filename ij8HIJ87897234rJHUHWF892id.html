<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin Pro 👑</title>
    <link rel="stylesheet" href="estilos.css?v=5.1">
    <style>
        /* RECUPERANDO FUENTE Y ESTILO GENERAL */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; color: #2d3436; }
        .admin-wrapper { max-width: 650px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; margin-bottom: 5px; font-size: 2.2rem; }
        .subtitle { text-align: center; color: #636e72; margin-bottom: 25px; font-weight: 500; }

        /* CATEGORÍAS (IGUAL QUE TU IMAGEN) */
        .category-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .btn-main { 
            flex-grow: 1; padding: 18px; border: none; border-radius: 15px; 
            color: white !important; font-weight: bold; cursor: pointer; 
            font-size: 1.1rem; text-transform: none; transition: all 0.2s;
        }
        .btn-icon { 
            background: #dfe6e9; border: none; width: 50px; height: 55px; 
            border-radius: 12px; cursor: pointer; font-size: 1.2rem; 
            display: flex; align-items: center; justify-content: center;
        }
        .btn-delete-cat:hover { background: #ff7675; color: white; }

        /* FORMULARIO EDICIÓN CATEGORÍA */
        .edit-form { 
            display: none; background: #f8f9fa; padding: 15px; border-radius: 12px; 
            margin-bottom: 15px; border: 1px dashed #b2bec3; align-items: center; gap: 10px; 
        }
        .edit-form.active { display: flex; }

        /* BOTÓN AÑADIR MENÚ */
        .btn-add-menu {
            width: 100%; padding: 15px; margin-top: 10px; border: 2px dashed #b2bec3;
            background: #fdfdfd; color: #636e72; border-radius: 15px;
            font-weight: bold; cursor: pointer; font-size: 1rem; transition: all 0.2s;
        }
        .btn-add-menu:hover { border-color: #74b9ff; color: #74b9ff; background: #f0f7ff; }

        /* SECCIÓN PREGUNTAS (ESTILO ANTERIOR) */
        #seccion-preguntas { display: none; margin-top: 40px; border-top: 2px solid #eee; padding-top: 30px; }
        .form-nueva-p { background: #f1f2f6; padding: 25px; border-radius: 18px; margin-bottom: 30px; border: 1px solid #dcdde1; }
        
        textarea, select, .opcion-item input[type="text"] {
            font-family: inherit; font-size: 1rem; padding: 10px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box;
        }

        /* BOTÓN X CENTRADO */
        .opcion-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .btn-del-opt { 
            background: #ff7675; color: white; border: none; min-width: 38px; height: 38px; 
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            font-size: 1.1rem; font-weight: bold; padding: 0;
        }

        /* TARJETAS DE PREGUNTA ALINEADAS */
        .pregunta-card { 
            background: #fff; padding: 18px; border-radius: 15px; margin-bottom: 15px; 
            border: 1px solid #eee; border-left: 6px solid #333; 
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .pregunta-btns { display: flex; flex-direction: column; gap: 6px; min-width: 85px; }
        .btn-p { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 0.85rem; }

        /* NOTIFICACIONES */
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .toast { background: #2d3436; color: white; padding: 12px 22px; border-radius: 10px; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* MODAL CONFIRM */
        #custom-confirm { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .confirm-box { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="custom-confirm">
    <div class="confirm-box">
        <p id="confirm-msg" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 25px;">¿Estás seguro?</p>
        <div style="display: flex; gap: 12px; justify-content: center;">
            <button onclick="closeConfirm(false)" style="padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; background: #dfe6e9; font-weight: bold;">Cancelar</button>
            <button id="btn-confirm-ok" onclick="closeConfirm(true)" style="padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; background: #ff7675; color: white; font-weight: bold;">Eliminar</button>
        </div>
    </div>
</div>

<div class="admin-wrapper">
    <h1>Panel Admin 👑</h1>
    <p class="subtitle">Gestión dinámica de categorías</p>
    
    <div id="categorias-menu"></div>
    <button class="btn-add-menu" onclick="crearNuevoMenu()">+ AÑADIR NUEVO MENÚ</button>

    <div id="seccion-preguntas">
        <h2 style="text-align:center; margin-bottom:25px;">Gestionando: <span id="nombre-cat-actual" style="color:#0984e3;"></span></h2>
        
        <div class="form-nueva-p" id="form-p">
            <h3 id="form-titulo" style="margin-top:0;">Añadir Nueva Pregunta</h3>
            <input type="hidden" id="edit-id">
            
            <textarea id="nueva-p" placeholder="Escribe aquí el enunciado de la pregunta..." style="height:70px; margin-bottom:15px;"></textarea>
            
            <select id="tipo-p" onchange="actualizarInterfazTipo()" style="margin-bottom:20px;">
                <option value="test">Tipo Test (Opciones múltiples)</option>
                <option value="definicion">Definición (Pregunta abierta)</option>
            </select>
            
            <div id="contenedor-test">
                <div id="lista-opciones"></div>
                <button onclick="agregarOpcionInput()" style="background:#74b9ff; color:white; border:none; padding:10px 18px; border-radius:10px; margin-top:10px; cursor:pointer; font-weight:bold;">+ Añadir Opción</button>
            </div>

            <div id="contenedor-def" style="display:none;">
                <textarea id="definicion-texto" placeholder="Escribe la respuesta correcta aquí..." style="height:70px;"></textarea>
            </div>

            <button onclick="procesarPregunta()" style="background:#2ecc71; color:white; border:none; padding:18px; width:100%; border-radius:15px; font-weight:bold; margin-top:25px; font-size:1.1rem; cursor:pointer; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);">GUARDAR PREGUNTA</button>
            <button id="btn-cancelar-edit" style="display:none; width:100%; margin-top:10px; padding:12px; border-radius:12px; border:none; background:#b2bec3; color:white; cursor:pointer; font-weight:bold;" onclick="resetearFormulario()">CANCELAR EDICIÓN</button>
        </div>

        <div id="lista-preguntas"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAu9LYkHUOIq2q0VrtLbhe1-Jk6FepnVo4", 
        databaseURL: "https://trivial-clase-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "trivial-clase", 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let catActualId = "";
    let confirmCallback = null;

    // --- NOTIFICACIONES ---
    window.notificar = (msg) => {
        const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
    };

    window.customConfirm = (msg, callback) => {
        document.getElementById('confirm-msg').innerText = msg;
        document.getElementById('custom-confirm').style.display = 'flex';
        confirmCallback = callback;
    };

    window.closeConfirm = (res) => {
        document.getElementById('custom-confirm').style.display = 'none';
        if(res && confirmCallback) confirmCallback();
    };

    // --- LÓGICA DE MENÚS ---
    async function cargarMenu() {
        const menu = document.getElementById('categorias-menu');
        menu.innerHTML = "";
        const snap = await get(ref(db, 'configuracion'));
        if (snap.exists()) {
            Object.entries(snap.val()).forEach(([id, data]) => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="category-row">
                        <button class="btn-main" style="background:${data.color}" onclick="abrirGestion('${id}', '${data.nombre}')">${data.nombre}</button>
                        <button class="btn-icon" onclick="toggleEditCat('${id}')">✏️</button>
                        <button class="btn-icon btn-delete-cat" onclick="borrarMenu('${id}')">🗑️</button>
                    </div>
                    <div id="edit-cat-${id}" class="edit-form">
                        <input type="text" id="n-${id}" value="${data.nombre}" style="flex-grow:1;">
                        <input type="color" id="c-${id}" value="${data.color}" style="width:50px; height:42px; border:none; cursor:pointer; background:none;">
                        <button onclick="guardarCat('${id}')" style="background:#2ecc71; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">OK</button>
                    </div>`;
                menu.appendChild(div);
            });
        }
    }

    window.crearNuevoMenu = () => {
        const colores = ['#ff7675', '#74b9ff', '#55efc4', '#a29bfe', '#ffeaa7', '#fab1a0', '#00b894', '#00cec9'];
        const colorAzar = colores[Math.floor(Math.random()*colores.length)];
        push(ref(db, 'configuracion'), { nombre: "NUEVO MENÚ", color: colorAzar }).then(() => {
            notificar("✨ Menú creado correctamente"); cargarMenu();
        });
    };

    window.borrarMenu = (id) => {
        customConfirm("¿Deseas eliminar este menú y todas sus preguntas?", () => {
            remove(ref(db, 'configuracion/' + id));
            remove(ref(db, 'preguntas/' + id));
            notificar("🗑️ Menú eliminado"); cargarMenu();
            document.getElementById('seccion-preguntas').style.display = 'none';
        });
    };

    window.toggleEditCat = (id) => {
        const f = document.getElementById(`edit-cat-${id}`);
        const active = f.classList.contains('active');
        document.querySelectorAll('.edit-form').forEach(el => el.classList.remove('active'));
        if(!active) f.classList.add('active');
    };

    window.guardarCat = (id) => {
        const n = document.getElementById(`n-${id}`).value;
        const c = document.getElementById(`c-${id}`).value;
        set(ref(db, 'configuracion/' + id), { nombre: n, color: c }).then(() => {
            notificar("✅ Cambios aplicados"); cargarMenu();
        });
    };

    // --- LÓGICA DE PREGUNTAS ---
    window.agregarOpcionInput = (valor = "", esCorrecta = false) => {
        const lista = document.getElementById('lista-opciones');
        const letra = String.fromCharCode(65 + lista.children.length);
        const div = document.createElement('div');
        div.className = 'opcion-item';
        div.innerHTML = `
            <input type="radio" name="c-test" ${esCorrecta ? 'checked' : ''} style="width:22px; height:22px;"> 
            <input type="text" value="${valor}" placeholder="Opción ${letra}"> 
            <button class="btn-del-opt" onclick="this.parentElement.remove(); actualizarPlaceholders();">✕</button>`;
        lista.appendChild(div);
    };

    window.actualizarPlaceholders = () => {
        document.querySelectorAll('#lista-opciones input[type="text"]').forEach((input, i) => {
            input.placeholder = `Opción ${String.fromCharCode(65 + i)}`;
        });
    };

    window.actualizarInterfazTipo = () => {
        const t = document.getElementById('tipo-p').value;
        document.getElementById('contenedor-test').style.display = t === 'test' ? 'block' : 'none';
        document.getElementById('contenedor-def').style.display = t === 'definicion' ? 'block' : 'none';
        if(t === 'test' && document.getElementById('lista-opciones').children.length === 0) {
            agregarOpcionInput(); agregarOpcionInput();
        }
    };

    window.abrirGestion = (id, nombre) => {
        catActualId = id;
        document.getElementById('seccion-preguntas').style.display = 'block';
        document.getElementById('nombre-cat-actual').innerText = nombre.toUpperCase();
        resetearFormulario(); cargarPreguntas();
        window.scrollTo({ top: document.getElementById('seccion-preguntas').offsetTop - 20, behavior: 'smooth' });
    };

    async function cargarPreguntas() {
        const lista = document.getElementById('lista-preguntas');
        lista.innerHTML = "<p style='text-align:center;'>Cargando preguntas...</p>";
        const snap = await get(ref(db, 'preguntas/' + catActualId));
        lista.innerHTML = "";
        
        const btnCat = Array.from(document.querySelectorAll('.btn-main')).find(b => b.innerText.toUpperCase() === document.getElementById('nombre-cat-actual').innerText);
        const colorCard = btnCat ? btnCat.style.backgroundColor : "#333";

        if (snap.exists()) {
            Object.entries(snap.val()).forEach(([pid, p]) => {
                const div = document.createElement('div');
                div.className = 'pregunta-card';
                div.style.borderLeftColor = colorCard;
                div.innerHTML = `
                    <div style="flex-grow:1; padding-right:15px; font-weight:500;">${p.p}</div>
                    <div class="pregunta-btns">
                        <button class="btn-p" style="background:#f1c40f;" onclick='prepararEdicion("${pid}", ${JSON.stringify(p).replace(/'/g, "&apos;")})'>Editar</button>
                        <button class="btn-p" style="background:#ff7675;" onclick="borrarP('${pid}')">Borrar</button>
                    </div>`;
                lista.appendChild(div);
            });
        }
    }

    window.procesarPregunta = () => {
        const idEdit = document.getElementById('edit-id').value;
        const pTexto = document.getElementById('nueva-p').value;
        if(!pTexto) return notificar("⚠️ Escribe la pregunta");
        let datos = { p: pTexto, tipo: document.getElementById('tipo-p').value };
        if (datos.tipo === 'test') {
            let opciones = []; let correcta = "";
            document.querySelectorAll('.opcion-item').forEach(div => {
                const txt = div.querySelector('input[type="text"]').value;
                if(txt) { opciones.push(txt); if(div.querySelector('input[type="radio"]').checked) correcta = txt; }
            });
            if(opciones.length < 2 || !correcta) return notificar("⚠️ Revisa las opciones y marca la correcta");
            datos.r = opciones; datos.correcta = correcta;
        } else {
            datos.definicion = document.getElementById('definicion-texto').value;
            if(!datos.definicion) return notificar("⚠️ Escribe la respuesta");
        }
        const refP = idEdit ? ref(db, `preguntas/${catActualId}/${idEdit}`) : push(ref(db, 'preguntas/' + catActualId));
        set(refP, datos).then(() => {
            notificar(idEdit ? "✅ Pregunta modificada" : "🚀 Pregunta creada");
            resetearFormulario(); cargarPreguntas();
        });
    };

    window.borrarP = (id) => {
        customConfirm("¿Eliminar esta pregunta?", () => {
            remove(ref(db, `preguntas/${catActualId}/${id}`)).then(() => {
                notificar("🗑️ Pregunta borrada"); cargarPreguntas();
            });
        });
    };

    window.prepararEdicion = (id, data) => {
        document.getElementById('edit-id').value = id;
        document.getElementById('nueva-p').value = data.p;
        document.getElementById('tipo-p').value = data.tipo;
        document.getElementById('form-titulo').innerText = "Modificar Pregunta";
        document.getElementById('btn-cancelar-edit').style.display = "block";
        actualizarInterfazTipo();
        if(data.tipo === 'test') {
            document.getElementById('lista-opciones').innerHTML = "";
            data.r.forEach(opc => agregarOpcionInput(opc, opc === data.correcta));
        } else { document.getElementById('definicion-texto').value = data.definicion; }
        window.scrollTo({ top: document.getElementById('form-p').offsetTop - 20, behavior: 'smooth' });
    };

    window.resetearFormulario = () => {
        document.getElementById('edit-id').value = "";
        document.getElementById('form-titulo').innerText = "Añadir Nueva Pregunta";
        document.getElementById('nueva-p').value = "";
        document.getElementById('lista-opciones').innerHTML = "";
        document.getElementById('btn-cancelar-edit').style.display = "none";
        actualizarInterfazTipo();
    };

    cargarMenu();
</script>
</body>
</html>
