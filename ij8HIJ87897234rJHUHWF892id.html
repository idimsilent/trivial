<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin Pro 👑</title>
    <link rel="stylesheet" href="estilos.css?v=4.2">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .admin-wrapper { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        .category-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .btn-main { 
            flex-grow: 1; padding: 15px; border: none; border-radius: 12px; 
            color: white !important; font-weight: bold; cursor: pointer; font-size: 1.1rem;
            transition: all 0.2s; text-transform: uppercase;
        }
        /* Corrección para el tercer botón y otros: forzar texto blanco */
        #btn-amarillo, .btn-amarillo { color: white !important; }

        .btn-edit { background: #dfe6e9; border: none; width: 45px; height: 50px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }

        .edit-form { display: none; background: #fdfdfd; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed #bbb; align-items: center; gap: 10px; }
        .edit-form.active { display: flex; }

        #seccion-preguntas { margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; display: none; }
        
        /* Estilos Formulario Dinámico */
        .form-nueva-p { background: #f1f2f6; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #dcdde1; }
        .opcion-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .opcion-item input[type="text"] { flex-grow: 1; }
        .opcion-item input[type="radio"] { width: 20px; height: 20px; cursor: pointer; }
        
        .btn-mini { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-add-opt { background: #74b9ff; color: white; margin-top: 5px; }
        .btn-add { background: #2ecc71; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }

        /* Tarjetas de preguntas */
        .pregunta-card { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 6px solid #333; position: relative; }
        .acciones-p { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .btn-p-acc { border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; color: white; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="admin-wrapper">
    <h1 style="text-align:center;">Panel Admin 👑</h1>
    
    <div id="categorias-menu"></div>

    <div id="seccion-preguntas">
        <h2 id="titulo-gestion">Gestionando: <span id="nombre-cat-actual">...</span></h2>
        
        <div class="form-nueva-p" id="form-p">
            <h3 id="form-titulo">Añadir Nueva Pregunta</h3>
            <input type="hidden" id="edit-id"> <textarea id="nueva-p" placeholder="Enunciado de la pregunta (obligatorio)"></textarea>
            
            <select id="tipo-p" onchange="actualizarInterfazTipo()">
                <option value="test">Tipo Test (Múltiples opciones)</option>
                <option value="definicion">Definición (Abierta)</option>
            </select>
            
            <div id="contenedor-test">
                <p style="font-size: 0.8rem; color: #666; margin: 10px 0 5px;">Escribe las opciones y marca el círculo de la correcta:</p>
                <div id="lista-opciones">
                    </div>
                <button class="btn-mini btn-add-opt" onclick="agregarOpcionInput()">+ Añadir Opción</button>
            </div>

            <div id="contenedor-def" style="display:none;">
                <textarea id="definicion-texto" placeholder="Escribe aquí la respuesta correcta o definición"></textarea>
            </div>

            <button class="btn-add" id="btn-guardar-p" onclick="procesarPregunta()">GUARDAR PREGUNTA</button>
            <button class="btn-add" id="btn-cancelar-edit" onclick="resetearFormulario()" style="background:#b2bec3; display:none;">CANCELAR EDICIÓN</button>
        </div>

        <div id="lista-preguntas"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAu9LYkHUOIq2q0VrtLbhe1-Jk6FepnVo4", 
        authDomain: "trivial-clase.firebaseapp.com", 
        databaseURL: "https://trivial-clase-default-rtdb.europe-west1.firebasedatabase.app", 
        projectId: "trivial-clase", 
        storageBucket: "trivial-clase.firebasestorage.app", 
        messagingSenderId: "692832052784", 
        appId: "1:692832052784:web:72f9568beaf847a706aff5" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const categorias = ['rojo', 'verde', 'amarillo', 'morado', 'menta'];
    let catActual = "";

    // --- GESTIÓN DE CATEGORÍAS (BOTONES) ---
    async function cargarMenu() {
        const menu = document.getElementById('categorias-menu');
        menu.innerHTML = "";
        const snap = await get(ref(db, 'configuracion'));
        const config = snap.exists() ? snap.val() : {};

        categorias.forEach(cat => {
            const data = config[cat] || { nombre: cat, color: '#636e72' };
            const div = document.createElement('div');
            div.innerHTML = `
                <div class="category-row">
                    <button class="btn-main" id="btn-${cat}" style="background:${data.color}" onclick="abrirGestion('${cat}', '${data.nombre}')">${data.nombre}</button>
                    <button class="btn-edit" onclick="toggleEditCat('${cat}')">✏️</button>
                </div>
                <div id="edit-cat-${cat}" class="edit-form">
                    <input type="text" id="n-${cat}" value="${data.nombre}">
                    <input type="color" id="c-${cat}" value="${data.color}">
                    <button class="btn-mini" style="background:#27ae60; color:white;" onclick="guardarCat('${cat}')">OK</button>
                </div>`;
            menu.appendChild(div);
        });
    }

    window.toggleEditCat = (cat) => document.getElementById(`edit-cat-${cat}`).classList.toggle('active');
    window.guardarCat = (cat) => {
        const n = document.getElementById(`n-${cat}`).value;
        const c = document.getElementById(`c-${cat}`).value;
        set(ref(db, 'configuracion/' + cat), { nombre: n, color: c }).then(() => location.reload());
    };

    // --- GESTIÓN DINÁMICA DE OPCIONES ---
    window.agregarOpcionInput = (valor = "", esCorrecta = false) => {
        const lista = document.getElementById('lista-opciones');
        const div = document.createElement('div');
        div.className = 'opcion-item';
        div.innerHTML = `
            <input type="radio" name="correcta-test" ${esCorrecta ? 'checked' : ''}>
            <input type="text" class="input-opcion" value="${valor}" placeholder="Escribe una opción...">
            <button class="btn-mini" style="background:#ff7675; color:white;" onclick="this.parentElement.remove()">✕</button>
        `;
        lista.appendChild(div);
    };

    window.actualizarInterfazTipo = () => {
        const tipo = document.getElementById('tipo-p').value;
        document.getElementById('contenedor-test').style.display = tipo === 'test' ? 'block' : 'none';
        document.getElementById('contenedor-def').style.display = tipo === 'definicion' ? 'block' : 'none';
        if(tipo === 'test' && document.getElementById('lista-opciones').children.length === 0) agregarOpcionInput();
    };

    // --- GESTIÓN DE PREGUNTAS (AÑADIR / EDITAR / BORRAR) ---
    window.abrirGestion = (cat, nombre) => {
        catActual = cat;
        document.getElementById('seccion-preguntas').style.display = 'block';
        document.getElementById('nombre-cat-actual').innerText = nombre.toUpperCase();
        resetearFormulario();
        cargarPreguntas();
        window.scrollTo(0, document.getElementById('seccion-preguntas').offsetTop);
    };

    async function cargarPreguntas() {
        const lista = document.getElementById('lista-preguntas');
        lista.innerHTML = "Cargando...";
        const snap = await get(ref(db, 'preguntas/' + catActual));
        lista.innerHTML = "";
        if (snap.exists()) {
            Object.entries(snap.val()).forEach(([id, p]) => {
                const div = document.createElement('div');
                div.className = 'pregunta-card';
                div.style.borderLeftColor = document.getElementById(`btn-${catActual}`).style.backgroundColor;
                div.innerHTML = `
                    <div class="acciones-p">
                        <button class="btn-p-acc" style="background:#f1c40f;" onclick="prepararEdicion('${id}', ${JSON.stringify(p).replace(/"/g, '&quot;')})">Editar</button>
                        <button class="btn-p-acc" style="background:#e74c3c;" onclick="borrarP('${id}')">Eliminar</button>
                    </div>
                    <strong>P:</strong> ${p.p}<br>
                    <small>${p.tipo === 'test' ? 'Opciones: ' + p.r.join(' | ') + ' (✔ ' + p.correcta + ')' : 'Respuesta: ' + p.definicion}</small>
                `;
                lista.appendChild(div);
            });
        }
    }

    window.procesarPregunta = () => {
        const idEdit = document.getElementById('edit-id').value;
        const pTexto = document.getElementById('nueva-p').value;
        const tipo = document.getElementById('tipo-p').value;
        if(!pTexto) return alert("Escribe la pregunta");

        let datos = { p: pTexto, tipo: tipo };

        if (tipo === 'test') {
            const optDivs = document.querySelectorAll('.opcion-item');
            let opciones = [];
            let correcta = "";
            optDivs.forEach(div => {
                const texto = div.querySelector('.input-opcion').value;
                if(texto) {
                    opciones.push(texto);
                    if(div.querySelector('input[type="radio"]').checked) correcta = texto;
                }
            });
            if(opciones.length < 2) return alert("Añade al menos 2 opciones");
            if(!correcta) return alert("Marca cuál es la respuesta correcta");
            datos.r = opciones;
            datos.correcta = correcta;
        } else {
            datos.definicion = document.getElementById('definicion-texto').value;
        }

        const path = ref(db, `preguntas/${catActual}${idEdit ? '/' + idEdit : ''}`);
        const accion = idEdit ? set(path, datos) : push(ref(db, 'preguntas/' + catActual), datos);

        accion.then(() => {
            alert(idEdit ? "Pregunta modificada" : "Pregunta añadida");
            resetearFormulario();
            cargarPreguntas();
        });
    };

    window.prepararEdicion = (id, data) => {
        document.getElementById('edit-id').value = id;
        document.getElementById('nueva-p').value = data.p;
        document.getElementById('tipo-p').value = data.tipo;
        document.getElementById('form-titulo').innerText = "Editando Pregunta";
        document.getElementById('btn-guardar-p').innerText = "GUARDAR CAMBIOS";
        document.getElementById('btn-cancelar-edit').style.display = "block";
        
        actualizarInterfazTipo();
        if(data.tipo === 'test') {
            document.getElementById('lista-opciones').innerHTML = "";
            data.r.forEach(opc => agregarOpcionInput(opc, opc === data.correcta));
        } else {
            document.getElementById('definicion-texto').value = data.definicion;
        }
        window.scrollTo(0, document.getElementById('form-p').offsetTop);
    };

    window.resetearFormulario = () => {
        document.getElementById('edit-id').value = "";
        document.getElementById('nueva-p').value = "";
        document.getElementById('tipo-p').value = "test";
        document.getElementById('lista-opciones').innerHTML = "";
        document.getElementById('definicion-texto').value = "";
        document.getElementById('form-titulo').innerText = "Añadir Nueva Pregunta";
        document.getElementById('btn-guardar-p').innerText = "AÑADIR PREGUNTA";
        document.getElementById('btn-cancelar-edit').style.display = "none";
        actualizarInterfazTipo();
    };

    window.borrarP = (id) => { if(confirm("¿Borrar pregunta?")) remove(ref(db, `preguntas/${catActual}/${id}`)).then(() => cargarPreguntas()); };

    cargarMenu();
</script>
</body>
</html>
