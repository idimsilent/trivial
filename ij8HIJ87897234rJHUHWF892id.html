<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Categorías - Admin</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        .admin-card { background: white; padding: 20px; border-radius: 15px; margin: 10px auto; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        input[type="color"] { width: 50px; height: 40px; border: none; cursor: pointer; }
        .btn-save { padding: 10px 15px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Panel Admin 👑</h1>
        <p>Cambia el nombre y color de las categorías:</p>

        <div id="panel-editor">
            </div>

        <button onclick="location.href='menu.html'" style="margin-top:20px; background:#ccc; border:none; padding:10px; border-radius:5px; cursor:pointer;">Volver al Menú</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAu9LYkHUOIq2q0VrtLbhe1-Jk6FepnVo4", 
            authDomain: "trivial-clase.firebaseapp.com", 
            databaseURL: "https://trivial-clase-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "trivial-clase", 
            storageBucket: "trivial-clase.firebasestorage.app", 
            messagingSenderId: "692832052784", 
            appId: "1:692832052784:web:72f9568beaf847a706aff5" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const categorias = ['rojo', 'verde', 'amarillo', 'morado', 'menta'];

        const panel = document.getElementById('panel-editor');

        // Cargar datos actuales y crear formularios
        categorias.forEach(cat => {
            get(ref(db, 'configuracion/' + cat)).then((snapshot) => {
                const data = snapshot.exists() ? snapshot.val() : { nombre: cat.toUpperCase(), color: '#cccccc' };
                
                const div = document.createElement('div');
                div.className = 'admin-card';
                div.innerHTML = `
                    <input type="text" id="name-${cat}" value="${data.nombre}">
                    <input type="color" id="color-${cat}" value="${data.color}">
                    <button onclick="guardar('${cat}')" class="btn-save" style="background: ${data.color}">Guardar</button>
                `;
                panel.appendChild(div);
            });
        });

        window.guardar = (id) => {
            const nuevoNombre = document.getElementById(`name-${id}`).value;
            const nuevoColor = document.getElementById(`color-${id}`).value;

            set(ref(db, 'configuracion/' + id), {
                nombre: nuevoNombre,
                color: nuevoColor
            }).then(() => {
                alert(`Categoría ${id} actualizada con éxito`);
                location.reload(); // Recargar para ver los cambios de color
            });
        };
    </script>
</body>
</html>
