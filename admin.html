<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilos.css?v=1.4">
    <title>Panel Claudia</title>
</head>
<body>
    <div class="container">
        <h1>Panel Admin 👑</h1>
        <select id="colorSel">
            <option value="rojo">Rojo (Geografía)</option>
            <option value="verde">Verde (Arte)</option>
            <option value="amarillo">Amarillo (Deportes)</option>
            <option value="morado">Morado (Ciencia)</option>
            <option value="menta">Menta (Entretenimiento)</option>
        </select>
        <input type="text" id="pregunta" placeholder="Pregunta">
        <input type="text" id="respuestas" placeholder="Respuestas (separadas por comas)">
        <button class="btn-verde" onclick="guardar()">Añadir Pregunta</button>
        <button class="btn-rojo" onclick="borrar()" style="margin-top:20px;">Borrar todo este color</button>
        <button class="btn-volver" onclick="location.href='index.html'">Cerrar Sesión</button>
    </div>
    <script>
        function guardar() {
            const color = document.getElementById('colorSel').value;
            const p = document.getElementById('pregunta').value;
            const r = document.getElementById('respuestas').value.split(',').map(item => item.trim());
            if(!p || r.length < 1) return alert("Rellena los campos");
            let data = JSON.parse(localStorage.getItem('preguntas_' + color)) || [];
            data.push({ p: p, r: r });
            localStorage.setItem('preguntas_' + color, JSON.stringify(data));
            alert("¡Pregunta guardada en categoría " + color + "!");
            document.getElementById('pregunta').value = "";
            document.getElementById('respuestas').value = "";
        }
        function borrar() {
            const color = document.getElementById('colorSel').value;
            localStorage.removeItem('preguntas_' + color);
            alert("Memoria de " + color + " borrada.");
        }
    </script>
</body>
</html>
