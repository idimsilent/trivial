<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilos.css?v=1.5">
    <title>Panel Claudia - Firebase</title>
</head>
<body>
    <div class="container">
        <h1>Panel Admin Nube ☁️</h1>
        <select id="colorSel">
            <option value="rojo">Rojo (Geografía)</option>
            <option value="verde">Verde (Arte)</option>
            <option value="amarillo">Amarillo (Deportes)</option>
            <option value="morado">Morado (Ciencia)</option>
            <option value="menta">Menta (Entretenimiento)</option>
        </select>
        <input type="text" id="pregunta" placeholder="Pregunta">
        <input type="text" id="respuestas" placeholder="Respuestas (separadas por comas)">
        <button class="btn-verde" id="btnGuardar">Añadir a la Nube</button>
        <button class="btn-volver" onclick="location.href='index.html'">Cerrar Sesión</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAu9LYkHUOIq2q0VrtLbhe1-Jk6FepnVo4",
            authDomain: "trivial-clase.firebaseapp.com",
            databaseURL: "https://trivial-clase-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "trivial-clase",
            storageBucket: "trivial-clase.firebasestorage.app",
            messagingSenderId: "692832052784",
            appId: "1:692832052784:web:72f9568beaf847a706aff5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('btnGuardar').onclick = function() {
            const color = document.getElementById('colorSel').value;
            const p = document.getElementById('pregunta').value;
            const r = document.getElementById('respuestas').value.split(',').map(i => i.trim());
            
            if(!p || r.length < 1) return alert("Rellena todo");

            push(ref(db, 'preguntas/' + color), { p, r })
            .then(() => {
                alert("¡Guardado en la nube!");
                document.getElementById('pregunta').value = "";
                document.getElementById('respuestas').value = "";
            }).catch(e => alert("Error: Activa el 'Modo de prueba' en Firebase Realtime Database"));
        };
    </script>
</body>
</html>
