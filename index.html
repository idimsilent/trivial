<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Trivial de Clase!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- ESTILOS GENERALES Y FUENTES --- */
        body {
            font-family: 'Open Sans', sans-serif; /* Fuente general legible */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0faff; /* Color de fondo muy suave */
            transition: background-color 0.5s ease;
        }

        /* Fuentes especiales para títulos */
        h1, h2, h3 {
            font-family: 'Fredoka One', cursive;
            letter-spacing: 1px;
            margin-top: 0;
        }

        h1 { color: #2c3e50; font-size: 2.5rem; text-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
        h2 { color: #34495e; font-size: 1.8rem; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 550px;
            border: 4px solid #fff; /* Borde interno sutil */
        }

        /* --- ESTILOS DE BOTONES (Bases comunes) --- */
        button {
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Open Sans', sans-serif;
            font-weight: 600;
            outline: none;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1); /* Efecto 3D sutil al presionar */
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }

        /* --- BOTONES DE CATEGORÍA (Inicio) --- */
        .btn-cat-container {
            display: grid;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-cat {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            color: white;
        }

        /* Colores vivos y únicos para cada categoría */
        .btn-cat:nth-child(1) { background-color: #FF6B6B; } /* Rojo */
        .btn-cat:nth-child(1):hover { background-color: #FF5252; }
        
        .btn-cat:nth-child(2) { background-color: #4ECDC4; } /* Turquesa */
        .btn-cat:nth-child(2):hover { background-color: #3BBDB4; }
        
        .btn-cat:nth-child(3) { background-color: #FFD93D; color: #333; } /* Amarillo */
        .btn-cat:nth-child(3):hover { background-color: #FFC914; }
        
        .btn-cat:nth-child(4) { background-color: #6C5CE7; } /* Violeta */
        .btn-cat:nth-child(4):hover { background-color: #5B4CC4; }
        
        .btn-cat:nth-child(5) { background-color: #A8E6CF; color: #333; } /* Menta suave */
        .btn-cat:nth-child(5):hover { background-color: #8DDEB6; }

        /* --- SECCIONES DE PREGUNTA --- */
        #zona-pregunta {
            display: none;
        }

        /* Título de la pregunta específico */
        #titulo-pregunta {
            margin-bottom: 25px;
            color: #2c3e50;
        }

        /* Contenedor de opciones de respuesta */
        #opciones {
            display: grid;
            gap: 12px;
        }

        /* Botones de respuesta */
        .respuesta {
            background-color: #ecf0f1;
            color: #2c3e50;
            padding: 15px;
            font-size: 16px;
            border: 2px solid transparent;
        }
        
        .respuesta:hover {
            background-color: #bdc3c7;
            border-color: #95a5a6;
        }

        /* --- BOTÓN VOLVER --- */
        .btn-volver {
            background-color: #95a5a6;
            color: white;
            padding: 12px 25px;
            margin-top: 30px;
            font-size: 14px;
        }
        
        .btn-volver:hover {
            background-color: #7f8c8d;
        }

    </style>
</head>
<body>

    <div class="container" id="menu-principal">
        <h1>¡Trivial Express!</h1>
        <h2>Elige tu desafío</h2>
        <div class="btn-cat-container">
            <button class="btn-cat" onclick="generarPregunta(0)">🌍 Geografía</button>
            <button class="btn-cat" onclick="generarPregunta(1)">🎨 Arte y Cultura</button>
            <button class="btn-cat" onclick="generarPregunta(2)">⚽ Deportes</button>
            <button class="btn-cat" onclick="generarPregunta(3)">🔬 Ciencia</button>
            <button class="btn-cat" onclick="generarPregunta(4)">🎬 Entretenimiento</button>
        </div>
    </div>

    <div class="container" id="zona-pregunta">
        <h2 id="titulo-pregunta">Cargando pregunta...</h2>
        <div id="opciones">
            </div>
        <button class="btn-volver" onclick="volver()">⬅ Volver al Menú</button>
    </div>

    <script>
        // BASE DE DATOS DE PREGUNTAS (¡Amplíala tanto como quieras!)
        const baseDeDatos = [
            [ // Categoría 0: Geografía (Rojo)
                { p: "¿Cuál es el río más largo del mundo?", r: ["Amazonas", "Nilo", "Misisipi"] },
                { p: "¿En qué continente está Nepal?", r: ["Asia", "África", "Europa"] },
                { p: "¿Cuál es la capital de Australia?", r: ["Canberra", "Sídney", "Melbourne"] }
            ],
            [ // Categoría 1: Arte y Cultura (Turquesa)
                { p: "¿Quién pintó 'La noche estrellada'?", r: ["Vincent van Gogh", "Pablo Picasso", "Claude Monet"] },
                { p: "¿Cuál es el libro más vendido de la historia?", r: ["La Biblia", "Don Quijote de la Mancha", "Harry Potter"] }
            ],
            [ // Categoría 2: Deportes (Amarillo)
                { p: "¿Cuántos jugadores tiene un equipo de baloncesto en la cancha?", r: ["5", "6", "7"] },
                { p: "¿En qué país se inventó el voleibol?", r: ["Estados Unidos", "Francia", "Brasil"] }
            ],
            [ // Categoría 3: Ciencia (Violeta)
                { p: "¿Cuál es el símbolo químico del oro?", r: ["Au", "Ag", "Fe"] },
                { p: "¿Qué planeta es conocido como el 'Planeta Rojo'?", r: ["Marte", "Venus", "Júpiter"] }
            ],
            [ // Categoría 4: Entretenimiento (Menta suave)
                { p: "¿Cuál es la película más taquillera de todos los tiempos?", r: ["Avatar", "Avengers: Endgame", "Titanic"] },
                { p: "¿Quién interpreta a Iron Man en el MCU?", r: ["Robert Downey Jr.", "Chris Evans", "Mark Ruffalo"] }
            ]
        ];

        function generarPregunta(index) {
            const categoria = baseDeDatos[index];
            if (!categoria || categoria.length === 0) {
                alert("¡Vaya! Esta categoría aún no tiene preguntas.");
                return;
            }

            // Seleccionar pregunta aleatoria dentro de la categoría
            const aleatoria = categoria[Math.floor(Math.random() * categoria.length)];
            
            // Cambiar visibilidad de pantallas
            document.getElementById('menu-principal').style.display = 'none';
            document.getElementById('zona-pregunta').style.display = 'block';
            
            // Mostrar texto de la pregunta
            document.getElementById('titulo-pregunta').innerText = aleatoria.p;
            
            // Generar y mostrar botones de respuesta
            const divOpciones = document.getElementById('opciones');
            divOpciones.innerHTML = ""; // Limpiar opciones anteriores

            aleatoria.r.forEach(respuesta => {
                const btn = document.createElement('button');
                btn.className = 'respuesta';
                btn.innerText = respuesta;
                
                // Función simple para cuando hacen clic en una respuesta
                btn.onclick = () => {
                    alert("Has seleccionado: " + respuesta + "\n\n(¡Aquí podrías añadir lógica para comprobar si es correcta!)");
                };
                
                divOpciones.appendChild(btn);
            });
        }

        function volver() {
            // Volver a la pantalla principal
            document.getElementById('menu-principal').style.display = 'block';
            document.getElementById('zona-pregunta').style.display = 'none';
        }
    </script>
</body>
</html>
