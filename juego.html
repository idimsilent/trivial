<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivial - En Juego</title>
    <link rel="stylesheet" href="estilos.css?v=5.0">
    <style>
        .container { text-align: center; padding: 20px; }
        #feedback { margin-top: 20px; font-weight: bold; font-size: 1.8rem; height: 40px; }
        .opciones-container { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        
        /* Botones de respuesta con color dinámico */
        .btn-resp {
            padding: 15px; border: none; border-radius: 12px;
            color: white !important; font-weight: bold; font-size: 1.1rem;
            cursor: pointer;
        }
        
        .definicion-box {
            background: #f8f9fa; padding: 20px; border-radius: 15px;
            border: 2px dashed #ccc; margin-bottom: 20px; font-size: 1.3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="timer-container">
            <div id="timerCircle" class="timer-circle">
                <span id="timerNum" class="timer-text">60</span>
            </div>
        </div>

        <h2 id="txtP" style="margin-top:20px;">Cargando pregunta...</h2>
        
        <div id="contenido" class="opciones-container"></div>
        
        <div id="feedback"></div>

        <div id="pContainer" class="progress-container" style="display:none;">
            <div class="p-bar-bg"><div id="pBar" class="progress-bar"></div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Capturamos los datos de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const CAT_ID = urlParams.get('id');
        const CAT_COLOR = urlParams.get('color') || '#333';

        const firebaseConfig = { 
            apiKey: "AIzaSyAu9LYkHUOIq2q0VrtLbhe1-Jk6FepnVo4", 
            databaseURL: "https://trivial-clase-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "trivial-clase", 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const sonidoAcierto = new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3'); 
        const sonidoFallo = new Audio('https://cdn.pixabay.com/audio/2025/11/15/audio_721173197e.mp3');

        let tiempoRestante = 60;
        let juegoTerminado = false;
        let intervaloCrono;

        function iniciarCrono() {
            const circle = document.getElementById('timerCircle');
            const text = document.getElementById('timerNum');
            intervaloCrono = setInterval(() => {
                if (juegoTerminado) return;
                tiempoRestante--;
                text.innerText = tiempoRestante;
                const grados = ((60 - tiempoRestante) / 60) * 360;
                let color = (tiempoRestante > 30) ? "#27ae60" : (tiempoRestante > 15) ? "#f1c40f" : "#e74c3c";
                circle.style.backgroundImage = `conic-gradient(${color} ${grados}deg, #eee ${grados}deg)`;

                if (tiempoRestante <= 0) finalizarJuego("fallo", "⏰ ¡TIEMPO! Ha fallado.");
            }, 1000);
        }

        function finalizarJuego(resultado, mensaje) {
            if (juegoTerminado) return;
            juegoTerminado = true;
            clearInterval(intervaloCrono);
            const f = document.getElementById('feedback');
            
            if (resultado === "acierto") {
                f.innerText = "✨ ¡HA ACERTADO!";
                f.style.color = "#27ae60";
                sonidoAcierto.play().catch(() => {});
            } else {
                f.innerText = mensaje || "❌ HA FALLADO.";
                f.style.color = "#e74c3c";
                sonidoFallo.play().catch(() => {});
            }

            document.getElementById('contenido').style.pointerEvents = "none";
            document.getElementById('pContainer').style.display = "block";
            setTimeout(() => { document.getElementById('pBar').style.width = "0%"; }, 100);
            setTimeout(() => { location.href = 'menu.html'; }, 5000);
        }

        async function cargarPreguntaAzar() {
            const snap = await get(ref(db, 'preguntas/' + CAT_ID));
            if (!snap.exists()) {
                document.getElementById('txtP').innerText = "No hay preguntas aquí.";
                setTimeout(() => location.href='menu.html', 3000);
                return;
            }

            const preguntas = Object.values(snap.val());
            const azar = preguntas[Math.floor(Math.random() * preguntas.length)];
            
            document.getElementById('txtP').innerText = azar.p;
            const cont = document.getElementById('contenido');
            iniciarCrono();

            if(azar.tipo === 'test') {
                azar.r.forEach(res => {
                    const b = document.createElement('button');
                    b.innerText = res;
                    b.className = 'btn-resp';
                    b.style.backgroundColor = CAT_COLOR; // Color del menú original
                    b.onclick = () => (res === azar.correcta) ? finalizarJuego("acierto") : finalizarJuego("fallo");
                    cont.appendChild(b);
                });
            } else {
                const pDef = document.createElement('div');
                pDef.className = "definicion-box";
                pDef.innerText = azar.definicion;
                cont.appendChild(pDef);
                
                const bAcierto = document.createElement('button');
                bAcierto.innerText = "¡Ha acertado! ✅"; bAcierto.className = "btn-resp";
                bAcierto.style.backgroundColor = "#27ae60";
                bAcierto.onclick = () => finalizarJuego("acierto");

                const bFallo = document.createElement('button');
                bFallo.innerText = "Ha fallado... ❌"; bFallo.className = "btn-resp";
                bFallo.style.backgroundColor = "#e74c3c";
                bFallo.onclick = () => finalizarJuego("fallo");

                cont.appendChild(bAcierto);
                cont.appendChild(bFallo);
            }
        }

        cargarPreguntaAzar();
    </script>
</body>
</html>
