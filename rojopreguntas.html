<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css?v=1.7">
</head>
<body>
    <div class="container">
        <div class="timer-container">
            <div id="timer" class="timer-circle">60</div>
        </div>

        <h2 id="txtP">Conectando...</h2>
        <div id="contenido" class="opciones-container"></div>
        <div id="feedback" style="margin-top:20px; font-weight:bold; min-height:30px; font-size:1.1rem;"></div>
        
        <div id="pContainer" class="progress-container">
            <p style="font-size: 0.8rem; margin-bottom: 5px;">Volviendo al menú en 5s...</p>
            <div id="pBar" class="progress-bar"></div>
        </div>

        <button id="btnVolverManual" class="btn-volver" onclick="location.href='menu.html'">Volver al Menú</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAu9LYkHUOIq2q0VrtLbhe1-Jk6FepnVo4", 
            authDomain: "trivial-clase.firebaseapp.com", 
            databaseURL: "https://trivial-clase-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "trivial-clase", 
            storageBucket: "trivial-clase.firebasestorage.app", 
            messagingSenderId: "692832052784", 
            appId: "1:692832052784:web:72f9568beaf847a706aff5" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CONFIGURACIÓN DEL COLOR ---
        const colorCale = 'rojo'; 
        const claseBtn = 'btn-rojo';

        let tiempoRestante = 60;
        let juegoTerminado = false;
        let intervaloCrono;

        function iniciarCrono() {
            intervaloCrono = setInterval(() => {
                tiempoRestante--;
                document.getElementById('timer').innerText = tiempoRestante;
                if (tiempoRestante <= 10) document.getElementById('timer').style.color = "red";
                
                if (tiempoRestante <= 0) {
                    finalizarJuego("⏰ ¡TIEMPO AGOTADO! Has perdido.", "red");
                }
            }, 1000);
        }

        function finalizarJuego(mensaje, color) {
            if (juegoTerminado) return;
            juegoTerminado = true;
            clearInterval(intervaloCrono);

            // Mostrar mensaje
            const f = document.getElementById('feedback');
            f.innerText = mensaje;
            f.style.color = color;

            // Bloquear botones
            const botones = document.querySelectorAll('.opciones-container button');
            botones.forEach(b => b.disabled = true);

            // Activar barra de progreso de 5 segundos
            document.getElementById('pContainer').style.display = "block";
            setTimeout(() => {
                document.getElementById('pBar').style.width = "0%";
            }, 100);

            // Volver al menú tras 5s
            setTimeout(() => {
                location.href = 'menu.html';
            }, 5000);
        }

        get(ref(db, 'preguntas/' + colorCale)).then((snapshot) => {
            if (snapshot.exists()) {
                const preguntas = Object.values(snapshot.val());
                const azar = preguntas[Math.floor(Math.random() * preguntas.length)];
                document.getElementById('txtP').innerText = azar.p;
                const cont = document.getElementById('contenido');

                iniciarCrono();

                if(azar.tipo === 'test') {
                    azar.r.forEach(res => {
                        const b = document.createElement('button');
                        b.innerText = res; b.className = claseBtn;
                        b.onclick = () => {
                            if(res === azar.correcta) {
                                finalizarJuego("✅ ¡CORRECTO!", "green");
                            } else {
                                finalizarJuego("❌ FALLASTE. La correcta era: " + azar.correcta, "red");
                            }
                        };
                        cont.appendChild(b);
                    });
                } else {
                    // TIPO DEFINICIÓN (Aquí el tiempo también corre, pero se lee la definición)
                    const pDef = document.createElement('p');
                    pDef.innerText = azar.definicion;
                    pDef.style.background = "#f0f0f0"; pDef.style.padding = "15px"; pDef.style.borderRadius = "10px";
                    cont.appendChild(pDef);
                    // Para definición, podrías querer un botón de "Entendido" para volver
                    const bOK = document.createElement('button');
                    bOK.innerText = "Hecho"; bOK.className = claseBtn;
                    bOK.onclick = () => finalizarJuego("¡Definición leída!", "#333");
                    cont.appendChild(bOK);
                }
            } else {
                document.getElementById('txtP').innerText = "Sin preguntas aún.";
            }
        });
    </script>
</body>
</html>
