<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css?v=2.6">
    <title>Trivial - Rojo</title>
</head>
<body>
    <div class="container">
        <div class="timer-container">
            <div id="timerCircle" class="timer-circle">
                <span id="timerNum" class="timer-text">60</span>
            </div>
        </div>

        <h2 id="txtP">Cargando...</h2>
        <div id="contenido" class="opciones-container"></div>
        <div id="feedback" style="margin-top:20px; font-weight:bold; min-height:40px; font-size:1.2rem; text-transform: uppercase;"></div>
        
        <div id="pContainer" class="progress-container">
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 5px;">Volviendo al menú...</p>
            <div class="p-bar-bg">
                <div id="pBar" class="progress-bar"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAu9LYkHUOIq2q0VrtLbhe1-Jk6FepnVo4", 
            authDomain: "trivial-clase.firebaseapp.com", 
            databaseURL: "https://trivial-clase-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "trivial-clase", 
            storageBucket: "trivial-clase.firebasestorage.app", 
            messagingSenderId: "692832052784", 
            appId: "1:692832052784:web:72f9568beaf847a706aff5" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const COLOR_NOMBRE = 'rojo'; 
        const CLASE_BTN = 'btn-rojo';

        // --- SONIDOS OFICIALES DE GOOGLE ---
        const sonidoAcierto = new Audio('https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg'); 
        const sonidoFallo = new Audio('https://actions.google.com/sounds/v1/foley/beeps_error_set.ogg');

        // Desbloqueo automático al primer clic
        document.addEventListener('click', () => {
            sonidoAcierto.load();
            sonidoFallo.load();
        }, { once: true });

        let tiempoRestante = 60;
        let totalTiempo = 60;
        let juegoTerminado = false;
        let intervaloCrono;

        function iniciarCrono() {
            const circle = document.getElementById('timerCircle');
            const text = document.getElementById('timerNum');

            intervaloCrono = setInterval(() => {
                if (juegoTerminado) return;
                tiempoRestante--;
                text.innerText = tiempoRestante;

                const grados = ((totalTiempo - tiempoRestante) / totalTiempo) * 360;
                let color = "#27ae60"; 
                if (tiempoRestante <= 30) color = "#f1c40f"; 
                if (tiempoRestante <= 15) color = "#e67e22"; 
                if (tiempoRestante <= 7)  color = "#e74c3c"; 
                
                circle.style.backgroundImage = `conic-gradient(${color} ${grados}deg, #eeeeee ${grados}deg)`;

                if (tiempoRestante <= 0) {
                    finalizarJuego("fallo", `⏰ ¡TIEMPO! Pierdes el quesito ${COLOR_NOMBRE}`);
                }
            }, 1000);
        }

        function finalizarJuego(resultado, mensaje) {
            if (juegoTerminado) return;
            juegoTerminado = true;
            clearInterval(intervaloCrono);

            const f = document.getElementById('feedback');
            f.innerText = mensaje;
            
            if (resultado === "acierto") {
                f.style.color = "#27ae60";
                sonidoAcierto.play().catch(() => {});
            } else {
                f.style.color = "#e74c3c";
                sonidoFallo.play().catch(() => {});
            }

            document.getElementById('contenido').style.pointerEvents = "none";
            document.getElementById('pContainer').style.display = "block";
            const pBar = document.getElementById('pBar');
            
            setTimeout(() => { pBar.style.width = "0%"; }, 100);
            setTimeout(() => { location.href = 'menu.html'; }, 5000);
        }

        get(ref(db, 'preguntas/' + COLOR_NOMBRE)).then((snapshot) => {
            if (snapshot.exists()) {
                const preguntas = Object.values(snapshot.val());
                const azar = preguntas[Math.floor(Math.random() * preguntas.length)];
                document.getElementById('txtP').innerText = azar.p;
                const cont = document.getElementById('contenido');

                iniciarCrono();

                if(azar.tipo === 'test') {
                    azar.r.forEach(res => {
                        const b = document.createElement('button');
                        b.innerText = res; 
                        b.className = CLASE_BTN;
                        b.onclick = () => {
                            if(res === azar.correcta) {
                                finalizarJuego("acierto", `✨ ¡GANAS EL QUESITO ${COLOR_NOMBRE.toUpperCase()}!`);
                            } else {
                                finalizarJuego("fallo", `❌ ¡FALLO! PIERDES EL QUESITO ${COLOR_NOMBRE.toUpperCase()}.`);
                            }
                        };
                        cont.appendChild(b);
                    });
                } else {
                    const pDef = document.createElement('div');
                    pDef.innerText = azar.definicion;
                    pDef.className = "definicion-box";
                    cont.appendChild(pDef);
                    
                    const bAcierto = document.createElement('button');
                    bAcierto.innerText = "¡He acertado! ✅"; 
                    bAcierto.className = "btn-verde"; 
                    bAcierto.style.marginBottom = "10px";
                    bAcierto.onclick = () => finalizarJuego("acierto", `✨ ¡QUESITO ${COLOR_NOMBRE.toUpperCase()} CONSEGUIDO!`);

                    const bFallo = document.createElement('button');
                    bFallo.innerText = "He fallado... ❌"; 
                    bFallo.className = "btn-rojo"; 
                    bFallo.onclick = () => finalizarJuego("fallo", `❌ PIERDES EL QUESITO ${COLOR_NOMBRE.toUpperCase()}.`);

                    cont.appendChild(bAcierto);
                    cont.appendChild(bFallo);
                }
            }
        });
    </script>
</body>
</html>
