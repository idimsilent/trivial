<script>
    // 1. Intentamos leer de la memoria de Claudia (LocalStorage)
    const guardadas = JSON.parse(localStorage.getItem('preguntas_rojo'));
    
    // 2. Si no hay nada guardado, usamos unas por defecto
    const porDefecto = [
        { p: "¿Cuál es el océano más grande?", r: ["Pacífico", "Atlántico", "Índico"] }
    ];

    const listaFinal = (guardadas && guardadas.length > 0) ? guardadas : porDefecto;

    // 3. Elegir una al azar de la lista que toque
    const azar = listaFinal[Math.floor(Math.random() * listaFinal.length)];
    
    document.getElementById('pregunta').innerText = azar.p;
    azar.r.forEach(res => {
        const b = document.createElement('button');
        b.innerText = res; b.className = "btn-rojo";
        b.onclick = () => alert("Elegiste: " + res);
        document.getElementById('opciones').appendChild(b);
    });
</script>
