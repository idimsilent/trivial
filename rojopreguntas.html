<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="estilos.css?v=1.3">
</head>
<body>
    <div class="container">
        <h2 id="pregunta">Cargando...</h2>
        <div id="opciones" class="opciones-container"></div>
        <button class="btn-volver" onclick="location.href='menu.html'">Volver al Menú</button>
    </div>
    <script>
        const misPreguntas = [
            { p: "¿Cuál es el río más largo?", r: ["Amazonas", "Nilo", "Ebro"] },
            { p: "¿Capital de Francia?", r: ["París", "Berlín", "Roma"] }
        ];
        const azar = misPreguntas[Math.floor(Math.random() * misPreguntas.length)];
        document.getElementById('pregunta').innerText = azar.p;
        azar.r.forEach(res => {
            const b = document.createElement('button');
            b.innerText = res; b.className = "btn-rojo"; // Cambia esto según el archivo
            b.onclick = () => alert("Elegiste: " + res);
            document.getElementById('opciones').appendChild(b);
        });
    </script>
</body>
</html>
