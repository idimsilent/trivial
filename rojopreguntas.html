<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css?v=1.8">
</head>
<body>
    <div class="container">
        <div class="timer-container">
            <div id="timer" class="timer-circle">60</div>
        </div>

        <h2 id="txtP">Conectando...</h2>
        <div id="contenido" class="opciones-container"></div>
        <div id="feedback" style="margin-top:20px; font-weight:bold; min-height:40px; font-size:1.3rem; text-transform: uppercase;"></div>
        
        <div id="pContainer" class="progress-container">
            <p id="txtVolviendo" style="font-size: 0.9rem; margin-bottom: 5px;">Volviendo al menú...</p>
            <div id="pBar" class="progress-bar"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAu9LYkHUOIq2q0VrtLbhe1-Jk6FepnVo4", 
            authDomain: "trivial-clase.firebaseapp.com", 
            databaseURL: "https://trivial-clase-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "trivial-clase", 
            storageBucket: "trivial-clase.firebasestorage.app", 
            messagingSenderId: "692832052784", 
            appId: "1:692832052784:web:72f9568beaf847a706aff5" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CONFIGURACIÓN DE ESTA PÁGINA ---
        const COLOR_NOMBRE = 'rojo'; // Cambiar a 'verde', 'amarillo', etc.
        const CLASE_BTN = 'btn-rojo';

        // --- SONIDOS ---
        const sonidoAcierto = new Audio('https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3'); 
        const sonidoFallo = new Audio('https://cdn.pixabay.com/audio/2022/03/10/audio_c35278d327.mp3');

        let tiempoRestante = 60;
        let juegoTerminado = false;
        let intervaloCrono;

        function iniciarCrono() {
            intervaloCrono = setInterval(() => {
                tiempoRestante--;
                document.getElementById('timer').innerText = tiempoRestante;
                if (tiempoRestante <= 10) document.getElementById('timer').style.color = "red";
                if (tiempoRestante <= 0) {
                    finalizarJuego("fallo", `⏰ ¡Tiempo agotado! Has perdido el quesito ${COLOR_NOMBRE}`);
                }
            }, 1000);
        }

        function finalizarJuego(resultado, mensaje) {
            if (juegoTerminado) return;
            juegoTerminado = true;
            clearInterval(intervaloCrono);

            const f = document.getElementById('feedback');
            f.innerText = mensaje;
            
            if (resultado === "acierto") {
                f.style.color = "#27ae60";
                sonidoAcierto.play();
            } else {
                f.style.color = "#e74c3c";
                sonidoFallo.play();
            }

            // Bloquear clics en botones
            document.getElementById('contenido').style.pointerEvents = "none";

            // Barra de progreso 5s
            const pContainer = document.getElementById('pContainer');
            const pBar = document.getElementById('pBar');
            pContainer.style.display = "block";
            
            // Animación de la barra
            pBar.style.width = "100%";
            setTimeout(() => { pBar.style.width = "0%"; }, 100);

            setTimeout(() => { location.href = 'menu.html'; }, 5000);
        }

        get(ref(db, 'preguntas/' + COLOR_NOMBRE)).then((snapshot) => {
            if (snapshot.exists()) {
                const preguntas = Object.values(snapshot.val());
                const azar = preguntas[Math.floor(Math.random() * preguntas.length)];
                document.getElementById('txtP').innerText = azar.p;
                const cont = document.getElementById('contenido');

                iniciarCrono();

                if(azar.tipo === 'test') {
                    azar.r.forEach(res => {
                        const b = document.createElement('button');
                        b.innerText = res; b.className = CLASE_BTN;
                        b.onclick = () => {
                            if(res === azar.correcta) {
                                finalizarJuego("acierto", `✨ ¡Enhorabuena! Has conseguido el quesito ${COLOR_NOMBRE}`);
                            } else {
                                finalizarJuego("fallo", `❌ ¡Fallo! Has perdido el quesito ${COLOR_NOMBRE}. Era: ${azar.correcta}`);
                            }
                        };
                        cont.appendChild(b);
                    });
                } else {
                    // TIPO DEFINICIÓN
                    const pDef = document.createElement('p');
                    pDef.innerText = azar.definicion;
                    pDef.className = "definicion-box"; // Añade estilo en CSS
                    cont.appendChild(pDef);
                    
                    const bOK = document.createElement('button');
                    bOK.innerText = "¡Entendido!"; bOK.className = CLASE_BTN;
                    bOK.onclick = () => finalizarJuego("acierto", `📖 Definición leída. ¡Quesito ${COLOR_NOMBRE} para ti!`);
                    cont.appendChild(bOK);
                }
            }
        });
    </script>
</body>
</html>
