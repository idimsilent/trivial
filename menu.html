<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css?v=4.3">
    <title>Trivial de Clase - Menú</title>
    <style>
        /* SOLUCIÓN LETRAS BLANCAS: Forzamos el color en todos los botones de categoría */
        .opciones-container button {
            color: white !important;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Elige una categoría</h1>
        <div class="opciones-container" id="contenedor-botones">
            <button id="btn-rojo" onclick="location.href='rojopreguntas.html'">Cargando...</button>
            <button id="btn-verde" onclick="location.href='verdepreguntas.html'">Cargando...</button>
            <button id="btn-amarillo" onclick="location.href='amarillopreguntas.html'">Cargando...</button>
            <button id="btn-morado" onclick="location.href='moradopreguntas.html'">Cargando...</button>
            <button id="btn-menta" onclick="location.href='mentapreguntas.html'">Cargando...</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAu9LYkHUOIq2q0VrtLbhe1-Jk6FepnVo4", 
            authDomain: "trivial-clase.firebaseapp.com", 
            databaseURL: "https://trivial-clase-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "trivial-clase", 
            storageBucket: "trivial-clase.firebasestorage.app", 
            messagingSenderId: "692832052784", 
            appId: "1:692832052784:web:72f9568beaf847a706aff5" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const categorias = ['rojo', 'verde', 'amarillo', 'morado', 'menta'];

        get(ref(db, 'configuracion')).then((snapshot) => {
            if (snapshot.exists()) {
                const config = snapshot.val();
                categorias.forEach(cat => {
                    const btn = document.getElementById(`btn-${cat}`);
                    if (config[cat]) {
                        btn.innerText = config[cat].nombre;
                        btn.style.backgroundColor = config[cat].color;
                        btn.style.borderColor = config[cat].color;
                        btn.style.color = "white"; // Refuerzo extra por JS
                    }
                });
            }
        });
    </script>
</body>
</html>
