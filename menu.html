<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivial de Clase - Menú</title>
    <link rel="stylesheet" href="estilos.css?v=5.0">
    <style>
        .container { max-width: 500px; margin: 0 auto; text-align: center; padding: 20px; }
        .opciones-container { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        
        /* Botones dinámicos */
        .btn-menu {
            padding: 20px;
            border: none;
            border-radius: 18px;
            color: white !important;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .btn-menu:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Elige una categoría</h1>
        <div class="opciones-container" id="contenedor-botones">
            <p>Cargando categorías...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAu9LYkHUOIq2q0VrtLbhe1-Jk6FepnVo4", 
            authDomain: "trivial-clase.firebaseapp.com", 
            databaseURL: "https://trivial-clase-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "trivial-clase", 
            storageBucket: "trivial-clase.firebasestorage.app", 
            messagingSenderId: "692832052784", 
            appId: "1:692832052784:web:72f9568beaf847a706aff5" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function cargarCategorias() {
            const cont = document.getElementById('contenedor-botones');
            const snap = await get(ref(db, 'configuracion'));
            
            if (snap.exists()) {
                cont.innerHTML = "";
                Object.entries(snap.val()).forEach(([id, data]) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-menu';
                    btn.innerText = data.nombre;
                    btn.style.backgroundColor = data.color;
                    
                    // Al hacer clic, enviamos el ID y el Color a juego.html
                    btn.onclick = () => {
                        location.href = `juego.html?id=${id}&color=${encodeURIComponent(data.color)}`;
                    };
                    
                    cont.appendChild(btn);
                });
            } else {
                cont.innerHTML = "<p>No hay categorías creadas.</p>";
            }
        }

        cargarCategorias();
    </script>
</body>
</html>
